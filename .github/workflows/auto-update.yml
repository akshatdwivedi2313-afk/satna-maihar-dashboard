name: Auto update JGSA dashboard

on:
  workflow_dispatch:
    inputs:
      district:
        description: "District code"
        required: false
        default: "SATNA"
      date:
        description: "Date YYYY-MM-DD, leave blank for today IST"
        required: false
        default: ""
  schedule:
    # 04:30 UTC = 10:00 AM IST daily
    - cron: "30 4 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Fetch latest JGSA snapshot
        env:
          JGSA_DISTRICT: ${{ github.event.inputs.district || 'SATNA' }}
          JGSA_DATE: ${{ github.event.inputs.date }}
        run: python scripts/fetch_jgsa_snapshot.py

      - name: Commit updated dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest_jgsa.pdf jgsa_snapshot.html jgsa_snapshot.txt jgsa_live_summary.js
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update JGSA snapshot"
            git push
          fi
